<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEXUS SCRAPER</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">NEXUS</div>
      <div class="sidebar-sub">TAVILY INTELLIGENCE</div>
    </div>
    <button class="new-chat-btn" onclick="newSession()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      NEW SESSION
    </button>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Top Bar -->
    <div id="topbar">
      <button class="topbar-btn" title="Toggle sidebar" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="topbar-center">
        <div class="status-dot" id="status-dot"></div>
        <span class="topbar-title">NEXUS SCRAPER</span>
      </div>

      <div class="api-key-section">
        <input id="api-key-input" type="password" placeholder="tvly-… Tavily key" autocomplete="off"
               oninput="onApiKeyChange(this.value)" />
        <span class="key-status missing" id="key-status">NO KEY</span>
      </div>
    </div>

    <!-- Intent Bar -->
    <div id="intent-bar"></div>

    <!-- Messages -->
    <div id="messages">
      <div id="empty-state"></div>
    </div>

    <!-- Input -->
    <div id="input-area">
      <div class="input-row">
        <textarea id="query-input" rows="1" placeholder='Ask anything… e.g. "history of github.com"'
                  oninput="autoResize(this)" onkeydown="onInputKeydown(event)"></textarea>
        <button id="send-btn" onclick="submitQuery()" disabled title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">↵ SEARCH &nbsp;·&nbsp; SHIFT+↵ NEW LINE &nbsp;·&nbsp; POWERED BY TAVILY · FREE API</div>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
